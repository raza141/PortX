[postgres]
schema = "public"
pool_min = 1
pool_max = 5

[fx]
base = "USD"
timeout_sec = 30


[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "portx"
version = "0.0.1"
description = "PortX ETL and helpers"
requires-python = ">=3.10"

[tool.setuptools.packages.find]
# include all importable packages under etl/
include = ["etl*"]

