{# One attachment row used by the upload list. Expects `form` from the formset or formset.empty_form. #}
<div class="kyc-row" data-row="document">
  {{ form.id }}
  <div class="kyc-row__grid">
    <div class="kyc-field">
      {{ form.document_type.label_tag }}
      {{ form.document_type }}
    </div>
    <div class="kyc-field">
      {{ form.file.label_tag }}
      {{ form.file }}
    </div>
        <div class="kyc-field kyc-field--del">
        <span class="kyc-del-checkbox">{{ form.DELETE }}</span>
        <button type="button" class="kyc-btn kyc-btn--xs kyc-btn--bad" data-remove-row>Remove</button>
    </div>
  </div>
</div>
